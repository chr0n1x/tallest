---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-kiwix-svc
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8080
  - name: https
    port: 443
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}-kiwix-server
  sessionAffinity: None
  type: ClusterIP
